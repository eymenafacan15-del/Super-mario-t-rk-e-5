<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mario Hammer JS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #5c94fc; }
        canvas { display: block; image-rendering: pixelated; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: white; font-family: 'Arial', sans-serif;
            font-size: 24px; text-shadow: 2px 2px 4px #000;
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui">SKOR: <span id="score">0</span> | CAN: <span id="lives">3</span></div>
    <canvas id="game"></canvas>

    <!-- JS Dosyamızı bağlıyoruz -->
    <script src="script.js"></script>
</body>
</html>
